services:
  - type: web
    name: my-travel-budgets-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "NODE_ENV=development pnpm install && (cd src/apps/api && npx prisma generate) && pnpm turbo run build --filter=@app/api... && (cd src/apps/api && npx prisma migrate deploy)"
    startCommand: NODE_ENV=production cd src/apps/api && node dist/main
    envVars:
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "30d"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: MAGIC_LINK_BASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CORS_ORIGIN
        value: "https://mybudget.cards"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RECEIPT_VISION_MODEL
        sync: false